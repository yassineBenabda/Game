<div class="container">
    <div>
    <h2>Ajouter un Game :</h2>
    </div>
    <form>
    <div class="col-sm-2 col-md-2 col-lg-2">
    <label >ID Game</label>
    <input type="text" [(ngModel)]="newGame.idGame" name="idProduit" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4" >
    <label >Nom Game</label>
    <input type="text"[(ngModel)]="newGame.nomGame" name="nomProduit" class="form-control">
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
    <label >Prix Game</label>
    <input type="number" [(ngModel)]="newGame.prixGame" name="prixProduit" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
    <label >Date de sortie</label>
    <input type="date" [(ngModel)]="newGame.dateCreation" name="dateCreation" class="form-control">
    </div>
    <div class="mt-2">
    <button type="submit" (click)="addGame()"class="btn btn-success">Ajouter</button>
    </div>
    </form>
    </div>
