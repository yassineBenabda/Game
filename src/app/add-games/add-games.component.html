<div class="container">
    <div>
    <h2>Ajouter un Game :</h2>
    </div>
    <form>
    <div class="col-sm-2 col-md-2 col-lg-2">
    <label >ID Game</label>
    <input type="text" [(ngModel)]="newGame.idGame" name="idGame" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4" >
    <label >Nom Game</label>
    <input type="text"[(ngModel)]="newGame.nomGame" name="nomGame" class="form-control">
    </div>
    <div class="col-sm-2 col-md-2 col-lg-2">
    <label >Prix Game</label>
    <input type="number" [(ngModel)]="newGame.prixGame" name="prixGame" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
    <label >Date de sortie</label>
    <input type="date" [(ngModel)]="newGame.datedeSortie" name="datedeSortie" class="form-control">
    </div>
    <div class="col-sm-4 col-md-4 col-lg-4">
        <label>Genre</label>
        <select class="form-control form-control-lg" id="idGenre" name="idGenre"[(ngModel)]="newIdGenre">
            <option *ngFor="let genre of genres" [value]="genre.idGenre" >
                {{genre.nomGenre}}
        </option>
        </select>
    </div>
    <div class="mt-2">
    <button type="submit" (click)="addGame()"class="btn btn-success">Ajouter</button>
    </div>
    </form>
    </div>
