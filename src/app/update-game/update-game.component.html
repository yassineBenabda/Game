<div class="container">
    <div>
    <h2>Modifier un Game :</h2>
    </div>
    <form >
        <div class="col-sm-2 col-md-2 col-lg-2">
            <label>ID Game</label>
            <input type="text" [(ngModel)]="currentGame.idGame"name="idGame" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4" >
            <label>Nom Game</label>
            <input type="text"[(ngModel)]= "currentGame.nomGame"name="nomGame" class="form-control">
        </div>
        <div class="col-sm-2 col-md-2 col-lg-2">
            <label>Prix Game</label>
            <input type="number" [(ngModel)]= "currentGame.prixGame"name="prixGame" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>date de Sortie</label>
            <input type="date" [ngModel]= "currentGame.datedeSortie | date: 'yyyy-MM-dd'" (ngModelChange)="currentGame.datedeSortie = $event" name="datedeSortie" class="form-control">
        </div>
        <div class="col-sm-4 col-md-4 col-lg-4">
            <label>Genre</label>
            <select class="form-control form-control-lg" id="idGenre" name="idGenre"[(ngModel)]="updatedGenreId">
                <option *ngFor="let genre of genres" [value]="genre.idGenre" >
                    {{genre.nomGenre}}
            </option>
            </select>
        </div>
        <div class="mt-2">
            <button type="submit" (click)="updateGame()"class="btn btn-success">Modifier</button>
        </div>
    </form>
</div>
